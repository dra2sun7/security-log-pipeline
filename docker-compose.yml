networks:
  security-network:
    driver: bridge

services:
  # 1. Elasticsearch: 분산 보안 로그 저장소 (공식 유지)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.10
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - security-network

  # 2. Kibana: 보안 관제 UI 및 Alert 대시보드 (공식 유지)
  kibana:
    image: docker.elastic.co/kibana/kibana:7.17.10
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    networks:
      - security-network
    depends_on:
      - elasticsearch

  # 3. Zookeeper (cgroupv2 버그가 패치된 Confluent 공식 최신 이미지 계열 사용)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - security-network

  # 4. Apache Kafka (Zookeeper 버전과 호환되는 Confluent 공식 최신 이미지)
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      # 네트워크 충돌과 NullPointer를 원천 차단하는 표준 주소 매핑
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://127.0.0.1:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - security-network
    depends_on:
      - zookeeper

  # 5. Nginx: 테스트용 로그를 생성할 웹 서버
  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - /home/kakaouser/security-log-pipeline/web/logs/nginx:/var/log/nginx
      - /home/kakaouser/security-log-pipeline/config/nginx/nginx.conf:/etc/nginx/nginx.conf
    networks:
      - security-network

  # 6. Filebeat: Nginx 로그를 실시간 수집하여 Kafka로 전송하는 경량 에이전트
  filebeat:
    image: docker.elastic.co/beats/filebeat:7.17.10
    container_name: filebeat
    user: root
    volumes:
      - /home/kakaouser/security-log-pipeline/config/filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /home/kakaouser/security-log-pipeline/web/logs/nginx:/var/log/nginx:ro
    networks:
      - security-network
    depends_on:
      - kafka
      - nginx

  # 7. AKHQ: Kafka 대기열을 실시간 모니터링하는 웹 UI 💡
  akhq:
    image: tchiotludo/akhq:latest
    container_name: akhq
    ports:
      - "8080:8080" # 윈도우에서 8080 포트로 접속합니다.
    environment:
      AKHQ_CONFIGURATION: |
        akhq:
          connections:
            docker-kafka-cluster:
              properties:
                bootstrap.servers: "kafka:29092" # 우리 가상망 내부의 카프카 주소와 연결
    networks:
      - security-network
    depends_on:
      - kafka

  # 8. Logstash: Kafka 대기열의 로그를 실시간 가공/정제(ETL)하는 보안 두뇌 💡
  logstash:
    image: docker.elastic.co/logstash/logstash:7.17.10
    container_name: logstash
    volumes:
      # 위에서 만든 설정 파일을 컨테이너 내부로 바인드 마운트
      - /home/kakaouser/security-log-pipeline/config/logstash/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    networks:
      - security-network
    depends_on:
      - kafka
      - elasticsearch

volumes:
  es_data:
    driver: local
  nginx_logs:
    driver: local
