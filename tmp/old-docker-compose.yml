version: '3.8'

networks:
  security-network:
    driver: bridge

services:
  # 1. Elasticsearch: 분산 보안 로그 저장소
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.10
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms2g -Xmx2g" # 개인 PC 사정을 고려한 2GB 제한 (실무는 더 크게 잡음)
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - security-network

  # 2. Kibana: 보안 관제 UI 및 Alert 대시보드
  kibana:
    image: docker.elastic.co/kibana/kibana:7.17.10
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    networks:
      - security-network
    depends_on:
      - elasticsearch

  # 3. Zookeeper: Kafka 관리를 위한 코디네이터
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - security-network

  # 4. Apache Kafka: 대용량 트래픽 제어용 분산 메시지 큐 (버퍼)
  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://127.0.0.1:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    networks:
      - security-network
    depends_on:
      - zookeeper

  # 5. Nginx: 테스트용 로그를 생성할 웹 서버
  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - nginx_logs:/var/log/nginx
    networks:
      - security-network

  # 6. Filebeat: Nginx 로그를 실시간 수집하여 Kafka로 전송하는 경량 에이전트
  filebeat:
    image: docker.elastic.co/beats/filebeat:7.17.10
    container_name: filebeat
    user: root # 로그 파일 타깃에 접근하기 위한 권한 부여
    volumes:
      - /home/kakaouser/security-log-pipeline/config/filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - nginx_logs:/var/log/nginx:ro
    networks:
      - security-network
    depends_on:
      - kafka
      - nginx

volumes:
  es_data:
    driver: local
  nginx_logs: # <- 추가됨
    driver: local
